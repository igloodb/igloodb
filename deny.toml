# cargo-deny configuration: license and security-advisory gates for the
# dependency tree. Run locally with `cargo deny check`; CI runs it on
# every PR.

[graph]
all-features = true

[advisories]
# Fail on any advisory affecting the resolved dependency tree. If an
# advisory has no fix yet, add it to `ignore` WITH a comment explaining
# the exposure and a link to the tracking issue.
yanked = "deny"
ignore = [
    # paste is an unmaintained proc-macro (RUSTSEC-2024-0436), pulled in
    # transitively by arrow 53 / datafusion 44. Compile-time only, no
    # runtime exposure. Goes away with the next arrow/datafusion major
    # upgrade (roadmap F0.2 dependency-currency policy).
    "RUSTSEC-2024-0436",
]

[licenses]
# Permissive licenses common in the Rust ecosystem. Additions need a
# short justification in the PR that adds them.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "Unicode-3.0",
    "OpenSSL",
]

# ring bundles code under MIT/ISC/OpenSSL; spell it out for cargo-deny.
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
# Duplicate major versions bloat builds; keep visible but non-fatal.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
