name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - name: Cache cargo registry and build artifacts
      uses: Swatinem/rust-cache@v2
    - name: Check formatting
      run: cargo fmt --all -- --check
    - name: Run Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
    - name: Check docs
      run: cargo doc --no-deps
      env:
        RUSTDOCFLAGS: "-D warnings"
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  deny:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check licenses and security advisories
      uses: EmbarkStudios/cargo-deny-action@v2
      with:
        command: check

  coverage:
    runs-on: ubuntu-latest
    # Informational for now (roadmap F0.1): surfaces the coverage trend
    # without blocking merges. Flip to blocking once a baseline exists.
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
    - name: Cache cargo registry and build artifacts
      uses: Swatinem/rust-cache@v2
    - name: Install cargo-llvm-cov
      uses: taiki-e/install-action@cargo-llvm-cov
    - name: Report unit-test coverage
      run: cargo llvm-cov --summary-only

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: igloo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - name: Cache cargo registry and build artifacts
      uses: Swatinem/rust-cache@v2
    # Seeds my_pg_table for the in-crate integration_* tests (the
    # federation test creates and drops its own tables).
    - name: Seed integration database
      run: psql 'postgres://postgres:postgres@localhost:5432/igloo_test' -f scripts/seed_test_db.sql
    - name: Run integration tests
      run: |
        cargo test --lib integration_ -- --nocapture
        cargo test --test postgres_federation -- --nocapture
      env:
        IGLOO_TEST_POSTGRES_URI: postgres://postgres:postgres@localhost:5432/igloo_test
